name: Ansible Deployment Python App

on:
  push:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/roles/web_app/**'
      - '.github/workflows/ansible-deploy-matrix.yml'

env:
  ANSIBLE_CONFIG: ansible/ansible.cfg
  ANSIBLE_ROLES_PATH: ansible/roles

jobs:
  matrix-deploy:
    name: Deploy ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: Python
            var_file: app_python.yml
            playbook: deploy_python.yml
            port: 8000
            image: info-service-python
            container_port: 8000
          
          - name: Go
            var_file: app_bonus.yml
            playbook: deploy_bonus.yml
            port: 8001
            image: info-service-go
            container_port: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Setup Ansible Vault
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass

      - name: Deploy ${{ matrix.app.name }}
        run: |
          cd ansible
          ansible-playbook playbooks/deploy_python.yml --syntax-check
          ansible-playbook playbooks/deploy_bonus.yml --syntax-check
          cho "${{ matrix.app.name }} deployment completed"
