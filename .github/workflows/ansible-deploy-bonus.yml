name: Ansible Deployment - Go App

on:
  push:
    branches: [ main, master, develop ]
    paths:
      # Go app specific configurations
      - 'ansible/vars/app_bonus.yml'
      - 'ansible/playbooks/deploy_bonus.yml'
      
      # Role changes that affect Go app
      - 'ansible/roles/web_app/tasks/**'
      - 'ansible/roles/web_app/templates/docker-compose.yml.j2'
      
      # Workflow changes
      - '.github/workflows/ansible-deploy-bonus.yml'
      
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ansible/vars/app_bonus.yml'
      - 'ansible/playbooks/deploy_bonus.yml'
      
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      wipe_before_deploy:
        description: 'Wipe before deployment'
        required: false
        default: false
        type: boolean
      docker_tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'
        type: string
      go_version:
        description: 'Go version'
        required: false
        default: '1.21'
        type: string

env:
  ANSIBLE_CONFIG: ./ansible/ansible.cfg
  PYTHON_VERSION: '3.12'
  VAULT_PASSWORD_FILE: /tmp/vault_pass_bonus.txt
  APP_NAME: 'devops-go'
  APP_PORT: '8001'

jobs:
  lint:
    name: Lint Go App Ansible
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint yamllint
          ansible-galaxy collection install community.docker

      - name: Lint Go app variables
        run: |
          yamllint ansible/vars/app_bonus.yml
          ansible-playbook ansible/playbooks/deploy_bonus.yml --syntax-check

      - name: Lint web_app role
        run: |
          cd ansible
          ansible-lint roles/web_app/tasks/main.yml

  deploy:
    name: Deploy Go App to ${{ github.event.inputs.environment || 'staging' }}
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: |
          pip install ansible docker
          ansible-galaxy collection install community.docker

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Create Ansible Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ${{ env.VAULT_PASSWORD_FILE }}
          chmod 600 ${{ env.VAULT_PASSWORD_FILE }}

      - name: Prepare Go deployment variables
        run: |
          cd ansible
          
          EXTRA_VARS_FILE="/tmp/go_extra_vars.yml"
          
          # Environment-specific configuration
          if [ "${{ github.event.inputs.environment || 'staging' }}" = "production" ]; then
            echo "app_port: 80" >> $EXTRA_VARS_FILE
            echo "docker_tag: ${{ github.event.inputs.docker_tag || 'stable' }}" >> $EXTRA_VARS_FILE
            echo "app_environment:" >> $EXTRA_VARS_FILE
            echo "  APP_ENV: production" >> $EXTRA_VARS_FILE
            echo "  GOMAXPROCS: '4'" >> $EXTRA_VARS_FILE
            echo "  LOG_LEVEL: ERROR" >> $EXTRA_VARS_FILE
          else
            echo "app_port: 8001" >> $EXTRA_VARS_FILE
            echo "docker_tag: ${{ github.event.inputs.docker_tag || 'latest' }}" >> $EXTRA_VARS_FILE
            echo "app_environment:" >> $EXTRA_VARS_FILE
            echo "  APP_ENV: ${{ github.event.inputs.environment || 'staging' }}" >> $EXTRA_VARS_FILE
            echo "  GOMAXPROCS: '2'" >> $EXTRA_VARS_FILE
            echo "  LOG_LEVEL: DEBUG" >> $EXTRA_VARS_FILE
          fi
          
          # Add Go version label
          echo "container_labels:" >> $EXTRA_VARS_FILE
          echo "  go_version: ${{ github.event.inputs.go_version || '1.21' }}" >> $EXTRA_VARS_FILE
          
          # Wipe flag
          if [ "${{ github.event.inputs.wipe_before_deploy }}" = "true" ]; then
            echo "web_app_wipe: true" >> $EXTRA_VARS_FILE
          fi

      - name: Deploy Go Application
        run: |
          cd ansible
          
          echo "🚀 Deploying Go application..."
          echo "App: ${{ env.APP_NAME }}"
          echo "Port: ${{ env.APP_PORT }}"
          
          ansible-playbook playbooks/deploy_bonus.yml \
            --extra-vars "@/tmp/go_extra_vars.yml" \
            --vault-password-file ${{ env.VAULT_PASSWORD_FILE }} \
            --diff

      - name: Verify Go deployment
        run: |
          echo "=== Go Deployment Verification ==="
          
          # Health check
          for i in {1..10}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VM_HOST }}:${{ env.APP_PORT }}/health)
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Go app is healthy!"
              
              # Get app info
              APP_INFO=$(curl -s http://${{ secrets.VM_HOST }}:${{ env.APP_PORT }}/)
              echo "App response: ${APP_INFO:0:100}"
              
              # Check container
              ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
                "docker ps --filter 'name=${{ env.APP_NAME }}' --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"
              exit 0
            fi
            echo "Attempt $i/10: Waiting for Go app..."
            sleep 5
          done
          
          echo "❌ Go app health check failed"
          exit 1

      - name: Cleanup
        if: always()
        run: |
          rm -f ${{ env.VAULT_PASSWORD_FILE }}
          rm -f /tmp/go_extra_vars.yml