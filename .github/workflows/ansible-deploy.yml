name: Ansible Deployment

on:
  push:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ansible/**'

env:
  ANSIBLE_CONFIG: ansible/ansible.cfg
  ANSIBLE_ROLES_PATH: ansible/roles
  INVENTORY_PATH: ansible/inventory/hosts.ini

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml



  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible
          pip install docker
          ansible-galaxy collection install community.docker
          
      - name: Configure Ansible Vault
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_password
          chmod 600 /tmp/vault_password

      - name: Deploy with Ansible
        run: |
          cd ansible
        
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_password \
            --tags "app_deploy,compose" \
            --connection=local \
            --diff
          
      - name: Verify Deployment
        run: |
          sleep 15
          
          if curl -s -f http://localhost:8000/health > /dev/null; then
            echo "Application is healthy"
          else
            echo "Health check failed"
            docker ps -a
            docker logs devops-app 2>&1 | tail -20
            exit 1
          fi
          
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/vault_password
