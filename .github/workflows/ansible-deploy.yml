name: Ansible Deployment

on:
  push:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [ main, master, lab06 ]
    paths:
      - 'ansible/**'

env:
  ANSIBLE_CONFIG: ansible/ansible.cfg
  ANSIBLE_ROLES_PATH: ansible/roles
  INVENTORY_PATH: ansible/inventory/hosts.ini

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml



  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible
          pip install docker
          ansible-galaxy collection install community.docker
          
      - name: Configure Ansible Vault
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_password
          chmod 600 /tmp/vault_password

      - name: Setup for local deployment
        run: |
          echo "Current directory: $(pwd)"
          echo "ANSIBLE_CONFIG: $ANSIBLE_CONFIG"
          echo ""
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose
          sudo usermod -aG docker $USER || true
          docker --version
          docker-compose --version

      - name: Deploy with Ansible
        run: |
          cd ansible
        
          echo "=== Current ansible directory ==="
          pwd
          ls -la
          echo ""
          
          echo "=== Checking roles ==="
          ls -la roles/
          echo ""

          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_password \
            --tags "app_deploy,compose" \
            --connection=local \
            --diff
          
      - name: Verify Deployment
        run: |
          echo "Checking Docker containers..."
          docker ps -a
          echo ""
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "Health check attempt $((RETRY_COUNT+1))/$MAX_RETRIES..."
            
            if curl -s -f --max-time 10 http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed"
              HEALTH_RESPONSE=$(curl -s http://localhost:8000/health)
              echo "Health response: $HEALTH_RESPONSE"
              break
            else
              RETRY_COUNT=$((RETRY_COUNT+1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⏳ Health check failed, retrying in 10 seconds..."
                sleep 10
              fi
            fi
          done
          
          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "Health check failed after $MAX_RETRIES attempts"
            echo "Checking application logs..."
            docker logs devops-app 2>&1 | tail -30
            exit 1
          fi
          
          echo "Testing main endpoint..."
          if curl -s -f --max-time 10 http://localhost:8000/ > /dev/null 2>&1; then
            echo "Main endpoint is accessible"
            MAIN_RESPONSE=$(curl -s http://localhost:8000/ | head -50)
            echo "Main response (first 50 chars): ${MAIN_RESPONSE:0:50}..."
          else
            echo "Main endpoint failed"
            exit 1
          fi
                    
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/vault_password
