replicaCount: 4

image:
  repository: scruffyscarf/info-service-python
  tag: blue
  pullPolicy: Always

environment: bluegreen-test
debug: true
logLevel: "DEBUG"

service:
  type: NodePort
  nodePort: 30086

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

persistence:
  enabled: true
  size: 100Mi
