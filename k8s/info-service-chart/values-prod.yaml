replicaCount: 5

image:
  repository: scruffyscarf/info-service-python
  tag: vault
  pullPolicy: Always

service:
  type: LoadBalancer

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  successThreshold: 1

env:
  APP_NAME: "info-service-prod-with-vault"
  DEBUG: "true"
  LOG_LEVEL: "WARNING"
  CONFIG_FORMAT: "all"

secrets:
  enabled: false

vault:
  enabled: true
  address: http://vault.vault.svc.cluster.local:8200
  role: info-service-role
  secretPath: secret/data/info-service
  autoReload: true
  templates:
    env: true
    json: true
    yaml: true

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: ["ALL"]

podAntiAffinity:
  preferredDuringSchedulingIgnoredDuringExecution:
  - weight: 100
    podAffinityTerm:
      labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/name
          operator: In
          values:
          - info-service
      topologyKey: kubernetes.io/hostname

environment: "production"
debug: false
logLevel: "WARNING"

visitsFile: "/data/visits.txt"

persistence:
  enabled: true
  size: 1Gi
  storageClass: "standard"
