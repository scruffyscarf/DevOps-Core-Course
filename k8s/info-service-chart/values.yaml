replicaCount: 3

image:
  repository: scruffyscarf/info-service-python
  tag: vault
  pullPolicy: Always 

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop: ["ALL"]

service:
  type: NodePort
  port: 80
  targetPort: 5050
  nodePort: 30081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

livenessProbe:
  enabled: true
  path: /health
  port: 5050
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /health
  port: 5050
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  successThreshold: 1

hooks:
  enabled: true
  validation:
    enabled: true
  smokeTest:
    enabled: true
  notification:
    enabled: true

secrets:
  enabled: true
  name: app-credentials
  data:
    username: admin
    password: SuperSecretPassword123!
    api_key: dev-api-key-12345
    db_password: dev-db-pass

vault:
  enabled: false
  address: http://vault.vault.svc.cluster.local:8200
  authPath: kubernetes
  role: info-service-role
  secretPath: secret/data/info-service

secretRef:
  name: info-service-secrets
env:
  APP_NAME: "info-service-helm"
  DEBUG: "false"

environment: "development"
debug: true
logLevel: "INFO"

visitsFile: "/data/visits.txt"

config:
  mountPath: "/config"
  fileName: "config.json"

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 100Mi
  storageClass: ""

nodeSelector: {}

tolerations: []

affinity: {}

podAntiAffinity: {}
