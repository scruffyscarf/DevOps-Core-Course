apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "info-service.fullname" . }}-init
  labels:
    {{- include "info-service.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "info-service.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "info-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "info-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.init.enabled }}
      initContainers:
      - name: init-download
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Init Container 1: Downloading file..."
            wget -O /workdir/index.html {{ .Values.init.downloadUrl }}
            echo "Download completed. File size: $(wc -l < /workdir/index.html) lines"
            ls -la /workdir/
        volumeMounts:
        - name: workdir
          mountPath: /workdir
      
      - name: wait-for-service
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Init Container 2: Waiting for service {{ .Values.init.waitForService }}..."
            until nslookup {{ .Values.init.waitForService }}; do
              echo "  Service not ready, retrying in 2 seconds..."
              sleep 2
            done
            echo "Service {{ .Values.init.waitForService }} is available"
      
      - name: prepare-data
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "Init Container 3: Preparing data..."
            cp /workdir/index.html /data/index.html
            echo "Data prepared at $(date)" > /data/init-info.txt
            echo "Data ready"
        volumeMounts:
        - name: workdir
          mountPath: /workdir
        - name: data
          mountPath: /data
      {{- end }}
      
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "info-service.fullname" . }}-env
        volumeMounts:
        - name: config-volume
          mountPath: {{ .Values.config.mountPath }}
          readOnly: true
        - name: data
          mountPath: /data
        - name: workdir
          mountPath: /workdir
        {{- include "common-lib.resources" .Values.resources | nindent 8 }}
        {{- include "common-lib.probes.liveness" .Values.livenessProbe | nindent 8 }}
        {{- include "common-lib.probes.readiness" .Values.readinessProbe | nindent 8 }}
      
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "info-service.fullname" . }}-config
      - name: workdir
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "info-service.fullname" . }}-data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: {{ .Values.persistence.size }}
