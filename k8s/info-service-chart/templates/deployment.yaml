apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "info-service.fullname" . }}
  labels:
    {{- include "info-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "info-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "info-service.selectorLabels" . | nindent 8 }}
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "info-service.vault.annotations" . | nindent 8 }}
        vault.hashicorp.com/agent-inject-file-env: ".env"
        vault.hashicorp.com/agent-inject-file-config.json: "config.json"
        vault.hashicorp.com/agent-inject-file-config.yaml: "config.yaml"
        vault.hashicorp.com/agent-inject-period: "30s"
        checksum/config: {{ include (print $.Template.BasePath "/configmap-file.yaml") . | sha256sum }}
        checksum/env: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        {{- if .Values.vault.enabled }}
        {{- include "info-service.vault.annotations" . | nindent 8 }}
        {{- end }}
        helm.sh/restart: {{ now | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "info-service.serviceAccountName" . }}
      {{- if .Values.vault.enabled }}
      initContainers:
      - name: wait-for-vault
        image: busybox:latest
        command: ['sh', '-c', 'until [ -f /vault/secrets/config ]; do echo waiting for vault secrets; sleep 2; done']
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
      volumes:
      {{- if .Values.vault.enabled }}
      - name: vault-secrets
        emptyDir: {}
      {{- end }}
      - name: config-volume
        configMap:
          name: {{ include "info-service.fullname" . }}-config
      {{- if .Values.persistence.enabled }}
      - name: data-volume
        persistentVolumeClaim:
          claimName: {{ include "info-service.fullname" . }}-data
      {{- else }}
      - name: data-volume
        emptyDir: {}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        volumeMounts:
        {{- if .Values.vault.enabled }}
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        {{- end }}
        - name: config-volume
          mountPath: {{ .Values.config.mountPath }}
          readOnly: true
        - name: data-volume
          mountPath: /data
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ include "info-service.fullname" . }}-env
