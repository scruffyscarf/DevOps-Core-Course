apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "info-service.fullname" . }}
  labels:
    {{- include "info-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "info-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "info-service.selectorLabels" . | nindent 8 }}
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "info-service.vault.annotations" . | nindent 8 }}
        vault.hashicorp.com/agent-inject-file-env: ".env"
        vault.hashicorp.com/agent-inject-file-config.json: "config.json"
        vault.hashicorp.com/agent-inject-file-config.yaml: "config.yaml"
        vault.hashicorp.com/agent-inject-period: "30s"
      {{- end }}
    spec:
      serviceAccountName: {{ include "info-service.serviceAccountName" . }}
      {{- if .Values.vault.enabled }}
      initContainers:
      - name: wait-for-vault
        image: busybox:latest
        command: ['sh', '-c', 'until [ -f /vault/secrets/config ]; do echo waiting for vault secrets; sleep 2; done']
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
      volumes:
      - name: vault-secrets
        emptyDir: {}
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if not .Values.vault.enabled }}
        {{- if .Values.secrets.enabled }}
        envFrom:
        - secretRef:
            name: {{ include "info-service.fullname" . }}-secrets
        {{- end }}
        {{- end }}
        {{- include "common-lib.resources" .Values.resources | nindent 8 }}
        {{- include "common-lib.probes.liveness" .Values.livenessProbe | nindent 8 }}
        {{- include "common-lib.probes.readiness" .Values.readinessProbe | nindent 8 }}
        {{- if .Values.vault.enabled }}
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        {{- end }}
