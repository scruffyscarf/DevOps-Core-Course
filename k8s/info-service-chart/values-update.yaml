replicaCount: 3

image:
  repository: scruffyscarf/info-service-python
  tag: v1
  pullPolicy: Always

environment: update-test
debug: true
logLevel: "DEBUG"

service:
  type: NodePort
  nodePort: 30088

persistence:
  enabled: true
  size: 100Mi

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

env:
  APP_NAME: "info-service-update-test"
  DEBUG: "true"
  MESSAGE: "Version 1"
