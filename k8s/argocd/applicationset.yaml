apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: info-service-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
            namespace: dev
            replicas: 1
            debug: "true"
            imageTag: latest
            syncPolicy: automated
            prune: true
            selfHeal: true
          - environment: prod
            namespace: prod
            replicas: 3
            debug: "false"
            imageTag: 1.0.0
            syncPolicy: manual
            prune: false
            selfHeal: false
          - environment: staging
            namespace: staging
            replicas: 2
            debug: "true"
            imageTag: staging-latest
            syncPolicy: automated
            prune: true
            selfHeal: true
  
  template:
    metadata:
      name: info-service-{{.environment}}
      labels:
        environment: "{{.environment}}"
        app: info-service
    spec:
      project: info-service
      
      source:
        repoURL: https://github.com/scruffyscarf/DevOps-Core-Course.git
        targetRevision: HEAD
        path: k8s/info-service-chart
        helm:
          valueFiles:
            - values-{{.environment}}.yaml
          parameters:
            - name: image.tag
              value: "{{.imageTag}}"
            - name: environment
              value: "{{.environment}}"
            - name: replicaCount
              value: "{{.replicas}}"
      
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      
      syncPolicy:
        automated:
          prune: {{.prune}}
          selfHeal: {{.selfHeal}}
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
