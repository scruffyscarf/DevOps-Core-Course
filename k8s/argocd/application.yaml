apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: info-service-app
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/scruffyscarf/DevOps-Core-Course.git
    targetRevision: HEAD
    path: k8s/info-service-chart
    helm:
      valueFiles:
        - values-dev.yaml
      parameters:
        - name: scruffyscarf/info-service-python
          value: latest
  
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
