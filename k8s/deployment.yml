apiVersion: apps/v1
kind: Deployment
metadata:
  name: info-service
  labels:
    app: info-service
    tier: backend
    environment: development
spec:
  replicas: 5
  selector:
    matchLabels:
      app: info-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: info-service
        tier: backend
        version: v1
    spec:
      containers:
      - name: info-service
        image: scruffyscarf/info-service-python:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5050
          name: http
        env:
        - name: APP_NAME
          value: "info-service-k8s"
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5050
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5050
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop: ["ALL"]
      securityContext:
        fsGroup: 1000
