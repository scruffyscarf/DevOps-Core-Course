---
- name: Docker prerequisites and repository setup block
  block:
    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      tags:
        - docker_install
        - prerequisites

    - name: Add Docker GPG key
      get_url:
        url: "https://download.docker.com/linux/ubuntu/gpg"
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'
      tags:
        - docker_install
        - gpg

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] {{ docker_repo_url }} {{ ansible_facts['distribution_release'] }} stable"
        state: present
        update_cache: no
      tags:
        - docker_install
        - repository

  rescue:
    - name: Handle GPG key addition failure
      debug:
        msg: "GPG key addition failed, retrying..."
      tags:
        - rescue
        - debug

    - name: Wait before retry
      pause:
        seconds: 10
      tags:
        - rescue
        - wait

    - name: Retry Docker GPG key addition
      apt_key:
        url: "{{ docker_gpg_key_url }}"
        state: present
      when: gpg_key_added is failed
      tags:
        - rescue
        - gpg

  always:
    - name: Update apt cache after repository setup
      apt:
        update_cache: true
      tags:
        - docker_install
        - apt

  tags:
    - docker_install
    - block_repository

- name: Docker installation block
  block:
    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      notify: restart docker
      tags:
        - docker_install
        - packages

    - name: Install Docker Python SDK
      pip:
        name:
          - docker
          - docker-compose
        state: present
      tags:
        - docker_install
        - python

  rescue:
    - name: Handle Docker installation failure
      debug:
        msg: "Docker installation failed, cleaning up..."
      tags:
        - rescue
        - debug

    - name: Clean up failed Docker installation
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: absent
        purge: yes
      ignore_errors: true
      tags:
        - rescue
        - cleanup

  tags:
    - docker_install
    - block_install

- name: Docker configuration block
  block:
    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: true
      tags:
        - docker_config
        - service

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users | default([]) }}"
      tags:
        - docker_config
        - users

    - name: Create docker-compose directory
      file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'
      tags:
        - docker_config
        - directories

  always:
    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false
      tags:
        - docker_config
        - verification

    - name: Display Docker version
      debug:
        msg: "Docker version: {{ docker_version.stdout }}"
      tags:
        - docker_config
        - debug

  tags:
    - docker_config
    - block_config
