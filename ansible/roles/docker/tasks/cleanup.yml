---
- name: Cleanup existing Docker repository configuration
  block:
    - name: Remove all Docker repository files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/sources.list.d/additional-repositories.list
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/keyrings/docker.asc
        - /usr/share/keyrings/docker.gpg
        - /etc/apt/trusted.gpg.d/docker.gpg
        - /etc/apt/trusted.gpg.d/docker-archive-keyring.gpg
        - /etc/apt/trusted.gpg.d/docker-ce.gpg
      become: true
      ignore_errors: true
    
    - name: Remove any Docker repository from sources.list
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*docker.*|.*download.docker.*'
        state: absent
      become: true
    
    - name: Remove any Docker repository from sources.list.d
      shell: |
        grep -l "docker" /etc/apt/sources.list.d/* 2>/dev/null | xargs rm -f || true
        grep -l "download.docker" /etc/apt/sources.list.d/* 2>/dev/null | xargs rm -f || true
      become: true
      changed_when: false
      failed_when: false
      ignore_errors: true
    
    - name: Clean apt cache
      shell: |
        rm -rf /var/lib/apt/lists/*
        apt-get clean
      become: true
      ignore_errors: true
      changed_when: false
      
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 0
        force_apt_get: yes
      become: true
      register: apt_update
      retries: 3
      delay: 5
      until: apt_update is success
      
  tags:
    - docker_cleanup
