---
galaxy_info:
  author: "scruffyscarf"
  description: "Deploy Loki monitoring stack with Docker Compose"
  license: "MIT"
  min_ansible_version: "2.16"
  platforms:
    - name: Ubuntu
      versions:
        - jammy
        - noble
  galaxy_tags:
    - monitoring
    - loki
    - promtail
    - grafana
    - logging
    - observability

dependencies:
  - role: docker
    vars:
      docker_users:
        - "{{ ansible_user }}"
        - "{{ app_user | default('appuser') }}"
      docker_compose_install: true

  - role: common
    vars:
      common_packages:
        - python3-pip
        - curl
        - git
        - htop
