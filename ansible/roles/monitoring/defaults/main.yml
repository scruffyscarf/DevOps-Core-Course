monitoring_dir: "/opt/monitoring"
monitoring_network: "monitoring_network"
monitoring_network_driver: "bridge"

loki_version: "3.0.0"
loki_port: 3100
loki_retention_period: "168h"
loki_storage_type: "tsdb"
loki_schema_version: "v13"
loki_auth_enabled: false

promtail_version: "3.0.0"
promtail_port: 9080

grafana_version: "12.3.1"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "admin123"

prometheus_version: "v2.55.0"
prometheus_port: 9090
prometheus_retention_days: 15
prometheus_retention_size: "10GB"
prometheus_scrape_interval: "15s"
prometheus_evaluation_interval: "15s"

prometheus_targets:
  - job: "prometheus"
    targets: ["localhost:9090"]
    metrics_path: "/metrics"
  - job: "loki"
    targets: ["loki:3100"]
    metrics_path: "/metrics"
  - job: "grafana"
    targets: ["grafana:3000"]
    metrics_path: "/metrics"
  - job: "promtail"
    targets: ["promtail:9080"]
    metrics_path: "/metrics"
  - job: "app-python"
    targets: ["app-python:5050"]
    metrics_path: "/metrics"
    scrape_interval: "10s"
  - job: "app-python-extra"
    targets: ["app-python-extra:5050"]
    metrics_path: "/metrics"
    scrape_interval: "10s"

monitoring_apps:
  - name: "devops-python"
    port: 8000
    internal_port: 5050
    container_name: "app-python"
    label: "devops-python"
  - name: "devops-python-extra"
    port: 8001
    internal_port: 5050
    container_name: "app-python-extra"
    label: "devops-python-extra"

monitoring_cpu_limit: "1.0"
monitoring_memory_limit: "1G"
monitoring_cpu_reservation: "0.5"
monitoring_memory_reservation: "512M"

loki_cpu_limit: "1.0"
loki_memory_limit: "1G"
loki_cpu_reservation: "0.5"
loki_memory_reservation: "512M"

promtail_cpu_limit: "0.5"
promtail_memory_limit: "512M"
promtail_cpu_reservation: "0.2"
promtail_memory_reservation: "256M"

grafana_cpu_limit: "0.5"
grafana_memory_limit: "512M"
grafana_cpu_reservation: "0.2"
grafana_memory_reservation: "256M"

prometheus_cpu_limit: "1.0"
prometheus_memory_limit: "1G"
prometheus_cpu_reservation: "0.5"
prometheus_memory_reservation: "512M"

app_cpu_limit: "0.3"
app_memory_limit: "256M"
app_cpu_reservation: "0.1"
app_memory_reservation: "128M"

health_check_interval: 30
health_check_timeout: 10
health_check_retries: 5
health_check_start_period: 30

log_max_size: "10m"
log_max_file: "3"
